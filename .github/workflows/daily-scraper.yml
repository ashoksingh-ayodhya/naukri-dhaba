name: Daily Scraper - 10 AM IST

on:
  # ── Auto: every 5 minutes ────────────────────────────────
  schedule:
    - cron: '*/5 * * * *'

  # ── Manual: tap "Run workflow" on GitHub from your phone ─
  workflow_dispatch:
    inputs:
      reason:
        description: "Why running manually?"
        required: false
        default: "Manual trigger"

concurrency:
  group: daily-scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape-and-publish:
    name: Scrape all sources → Generate HTML
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scraper/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      # ── Pre-flight: check if source sites are reachable ──
      - name: Check source accessibility
        id: source_check
        run: |
          echo "=== Source Accessibility Check ==="
          if python3 scraper/check_sources.py; then
            echo "sources_down=false" >> $GITHUB_OUTPUT
          else
            echo "sources_down=true" >> $GITHUB_OUTPUT
          fi

      # ── Email alert when ALL sources are down ─────────────
      - name: Send alert email (all sources down)
        if: steps.source_check.outputs.sources_down == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ Naukri Dhaba — All source sites are DOWN (${{ env.TZ }} ${{ github.run_id }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: Naukri Dhaba Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            Hello,

            The Naukri Dhaba scraper ran at $(date +'%d %b %Y %I:%M %p IST') but
            ALL source websites are currently unreachable from GitHub Actions:

              • sarkariresult.com
              • freejobalert.com
              • rojgarresult.com

            The scraper was skipped to avoid a false-success commit.
            No new pages were generated.

            Please check the source sites manually or wait for the next scheduled run.

            — Naukri Dhaba Bot
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Stop if all sources are down
        if: steps.source_check.outputs.sources_down == 'true'
        run: |
          echo "All sources are down. Stopping workflow."
          exit 0

      # ── Normal scraper run ────────────────────────────────
      - name: Run Naukri Dhaba scraper
        run: |
          echo "=== Naukri Dhaba Scraper ==="
          echo "Time (IST): $(date)"
          python3 scraper/sarkari_scraper.py --refresh-existing
          echo "=== Scraper done ==="

      - name: Normalize generated pages
        run: python3 update-all-pages.py

      - name: Rebuild sitemap
        run: python3 generate-sitemap.py

      - name: Validate generated output
        run: python3 validate-generated-site.py

      - name: Commit new pages
        run: |
          git config user.name "Naukri Dhaba Bot"
          git config user.email "bot@naukridhaba.in"
          git add -A
          if git diff --staged --quiet; then
            echo "No new pages generated today."
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Auto-scrape $(date +'%d %b %Y %I:%M %p IST') - $COUNT files"
            git pull --rebase origin main
            git push
            echo "Pushed $COUNT new/updated files."
          fi

      - name: Show scraper log (last 50 lines)
        if: always()
        run: |
          echo "--- SCRAPER LOG ---"
          tail -50 scraper/logs/scraper.log 2>/dev/null || echo "(no log file)"
