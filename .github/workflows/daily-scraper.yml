name: Daily Scraper - 10 AM IST

on:
  # ── Auto: daily at 10:00 AM IST (4:30 AM UTC) ────────────
  schedule:
    - cron: '30 4 * * *'

  # ── Manual: tap "Run workflow" on GitHub from your phone ─
  workflow_dispatch:
    inputs:
      reason:
        description: "Why running manually?"
        required: false
        default: "Manual trigger"

concurrency:
  group: daily-scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape-and-publish:
    name: Scrape all sources → Generate HTML
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Skip Python scraper when CF Worker is the primary ─
      # Set repo secret CF_SCRAPER_MODE=cloudflare to skip this job
      # (the Cloudflare Worker runs at the same cron and handles scraping).
      - name: Check scraper mode
        id: mode_check
        run: |
          MODE="${{ secrets.CF_SCRAPER_MODE }}"
          if [ "$MODE" = "cloudflare" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "CF_SCRAPER_MODE=cloudflare — Cloudflare Worker is the primary scraper."
            echo "Skipping Python scraper. The CF Worker triggers post-scrape-update.yml directly."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "CF_SCRAPER_MODE not set to 'cloudflare' — running Python scraper."
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scraper/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright for JS-rendered page fallback
        if: steps.mode_check.outputs.skip != 'true'
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # ── Pre-flight: check if source sites are reachable ──
      - name: Check source accessibility
        if: steps.mode_check.outputs.skip != 'true'
        id: source_check
        env:
          CF_WORKER_PROXY_URL: ${{ secrets.CF_WORKER_PROXY_URL }}
          CF_WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }}
        run: |
          echo "=== Source Accessibility Check ==="
          if python3 scraper/check_sources.py; then
            echo "sources_down=false" >> $GITHUB_OUTPUT
          else
            echo "sources_down=true" >> $GITHUB_OUTPUT
          fi

      # ── Normal scraper run ────────────────────────────────
      - name: Run Naukri Dhaba scraper
        if: steps.mode_check.outputs.skip != 'true' && steps.source_check.outputs.sources_down != 'true'
        env:
          CF_WORKER_PROXY_URL: ${{ secrets.CF_WORKER_PROXY_URL }}
          CF_WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }}
        run: |
          echo "=== Naukri Dhaba Scraper ==="
          echo "Time (IST): $(date)"
          python3 scraper/sarkari_scraper.py --refresh-existing
          echo "=== Scraper done ==="

      - name: Regenerate state pages
        if: steps.mode_check.outputs.skip != 'true' && steps.source_check.outputs.sources_down != 'true'
        run: python3 generate-state-pages.py

      - name: Normalize generated pages
        if: steps.mode_check.outputs.skip != 'true' && steps.source_check.outputs.sources_down != 'true'
        run: python3 update-all-pages.py

      - name: Rebuild sitemap
        if: steps.mode_check.outputs.skip != 'true' && steps.source_check.outputs.sources_down != 'true'
        run: python3 generate-sitemap.py

      - name: Validate generated output
        if: steps.mode_check.outputs.skip != 'true' && steps.source_check.outputs.sources_down != 'true'
        run: python3 validate-generated-site.py

      # ── FORCE REBUILD: always sync listing pages with detail pages ──
      # Runs even when sources are down or in cloudflare mode to ensure listing
      # pages always reflect all detail pages in the repository.
      - name: Force rebuild listing pages
        if: always()
        run: |
          echo "=== Force Rebuild Listing Pages ==="
          echo "Time (IST): $(date)"
          python3 scraper/sarkari_scraper.py --rebuild-only
          echo "=== Listing rebuild done ==="

      # ── Validate listing pages match detail page directories ──
      - name: Validate listing page counts
        if: always()
        run: |
          echo "=== Listing Page Validation ==="
          python3 -c "
          import re, sys, pathlib

          errors = []
          checks = [
              ('latest-jobs.html', 'jobs', 'job'),
              ('results.html', 'results', 'result'),
              ('admit-cards.html', 'admit-cards', 'admit'),
          ]
          for html_file, detail_dir, kind in checks:
              p = pathlib.Path(html_file)
              d = pathlib.Path(detail_dir)
              if not p.exists() or not d.exists():
                  print(f'SKIP: {html_file} or {detail_dir}/ missing')
                  continue

              # Count detail pages
              detail_count = len(list(d.rglob('*.html')))

              # Count tbody rows in listing page
              content = p.read_text(encoding='utf-8')
              tbody_match = re.search(r'<tbody>(.*?)</tbody>', content, re.DOTALL)
              listing_count = len(re.findall(r'<tr>', tbody_match.group(1))) if tbody_match else 0

              pct = abs(listing_count - detail_count) / max(detail_count, 1) * 100
              status = 'OK' if pct <= 20 else 'MISMATCH'
              print(f'{html_file}: {listing_count} rows vs {detail_count} detail pages ({pct:.0f}% diff) [{status}]')
              if pct > 20:
                  errors.append(f'{html_file}: {listing_count} rows vs {detail_count} pages ({pct:.0f}% diff)')

          if errors:
              print(f'\nFAILED: Listing page mismatch exceeds 20%:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('\nAll listing pages are in sync with detail pages.')
          "

      - name: Commit new pages (primary sources only)
        if: always()
        run: |
          git config user.name "Manual Job Post Bot"
          git config user.email "bot@naukridhaba.in"
          # Only stage live site files — staging/ is gitignored
          git add -A
          if git diff --staged --quiet; then
            echo "No new pages generated today."
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Auto-scrape $(date +'%d %b %Y %I:%M %p IST') - $COUNT files"
            # Fetch remote and merge, preferring our generated content on conflict.
            # Using merge instead of rebase to avoid conflicts when two runs overlap.
            git fetch origin main
            git merge -X ours FETCH_HEAD --no-edit -m "Merge remote into auto-scrape $(date +'%d %b %Y %I:%M %p IST')" || true
            git push origin HEAD:main
            echo "Pushed $COUNT new/updated files."
          fi

      - name: Report staging summary
        if: always() && steps.mode_check.outputs.skip != 'true'
        run: |
          if [ -f staging/manifest.json ]; then
            STAGED=$(python3 -c "import json; m=json.load(open('staging/manifest.json')); print(len(m))")
            echo "Staging: $STAGED item(s) pending review from secondary sources."
            echo "Run 'python3 promote-staging.py --list' to see them."
          else
            echo "No staged items from secondary sources."
          fi

      - name: Show scraper log (last 100 lines)
        if: always()
        run: |
          echo "--- SCRAPER LOG ---"
          tail -100 scraper/logs/scraper.log 2>/dev/null || echo "(no log file)"
