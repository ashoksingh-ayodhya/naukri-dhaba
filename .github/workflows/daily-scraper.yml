name: Daily Scraper

on:
  schedule:
    - cron: "30 4 * * *"   # 10 AM IST daily
    - cron: "30 10 * * *"  # 4 PM IST daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — scrape but do not commit/push"
        required: false
        default: "false"

concurrency:
  group: scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape → MDX → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python deps
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run scraper → writes MDX files to content/
        working-directory: scraper
        env:
          NAUKRI_DHABA_SITE_URL: https://naukridhaba.in
          CF_WORKER_PROXY_URL: ${{ secrets.CF_WORKER_PROXY_URL }}
          CF_WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }}
        run: python sarkari_scraper.py

      - name: Count new/updated MDX files
        id: changes
        run: |
          git add content/
          CHANGED=$(git diff --cached --name-only | grep "\.mdx$" | wc -l)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "New/updated MDX files: $CHANGED"

      - name: Commit new MDX files
        if: steps.changes.outputs.changed != '0' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "Naukri Dhaba Bot"
          git config user.email "bot@naukridhaba.in"
          COUNT=$(git diff --cached --name-only | grep "\.mdx$" | wc -l)
          git commit -m "chore: scrape $(date +'%d %b %Y') — $COUNT new posts [skip ci]"
          git fetch origin ${{ github.ref_name }}
          git merge -X ours FETCH_HEAD --no-edit || true
          git push origin HEAD:${{ github.ref_name }}
          echo "Pushed $COUNT MDX files."

      - name: Trigger Next.js deploy
        if: steps.changes.outputs.changed != '0' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: deploy

      - name: Show scraper log
        if: always()
        run: tail -50 scraper/logs/scraper.log 2>/dev/null || echo "(no log)"
