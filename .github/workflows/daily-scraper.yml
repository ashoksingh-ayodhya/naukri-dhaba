name: Daily Scraper

on:
  push:
    branches: [main]
    paths:
      - 'scraper/run-now'
  repository_dispatch:
    types: [scrape]
  schedule:
    - cron: "30 1 * * *"   # 7 AM IST
    - cron: "30 7 * * *"   # 1 PM IST
    - cron: "30 13 * * *"  # 7 PM IST
    - cron: "30 19 * * *"  # 1 AM IST
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — scrape but do not commit/push"
        required: false
        default: "false"

concurrency:
  group: scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape → MDX → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python deps
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright Chromium
        continue-on-error: true
        run: python -m playwright install chromium --with-deps

      - name: Run scraper → writes MDX files to content/
        continue-on-error: true
        working-directory: scraper
        env:
          NAUKRI_DHABA_SITE_URL: https://naukridhaba.in
          CF_WORKER_PROXY_URL: ${{ secrets.CF_WORKER_PROXY_URL }}
          CF_WORKER_SECRET: ${{ secrets.CF_WORKER_SECRET }}
        run: python sarkari_scraper.py

      - name: Count new/updated MDX files
        id: changes
        run: |
          git add content/ scraper/seen_items.json
          CHANGED=$(git diff --cached --name-only | grep "\.mdx$" | wc -l)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "New/updated MDX files: $CHANGED"

      - name: Commit new MDX files
        if: steps.changes.outputs.changed != '0' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "Naukri Dhaba Bot"
          git config user.email "bot@naukridhaba.in"
          COUNT=$(git diff --cached --name-only | grep "\.mdx$" | wc -l)
          git commit -m "chore: scrape $(date +'%d %b %Y') — $COUNT new posts [skip ci]"
          # Preserve work other bots pushed since checkout: on conflict take
          # THEIRS (remote), never silently discard it. New scraped files have
          # no remote counterpart, so they still merge in cleanly.
          for attempt in 1 2 3 4 5; do
            git fetch origin ${{ github.ref_name }} || true
            git merge -X theirs FETCH_HEAD --no-edit || true
            git push origin HEAD:${{ github.ref_name }} && break || sleep $((attempt * 5))
          done
          echo "Pushed $COUNT MDX files."

      - name: Ping Google & Bing sitemaps
        if: steps.changes.outputs.changed != '0' && github.event.inputs.dry_run != 'true'
        continue-on-error: true
        run: |
          SITEMAP="https://naukridhaba.in/sitemap.xml"
          echo "Pinging Google..."
          curl -s "https://www.google.com/ping?sitemap=${SITEMAP}" -o /dev/null -w "%{http_code}"
          echo " (Google ping)"
          echo "Pinging Bing..."
          curl -s "https://www.bing.com/ping?sitemap=${SITEMAP}" -o /dev/null -w "%{http_code}"
          echo " (Bing ping)"

      - name: Notify Google Indexing API
        if: steps.changes.outputs.changed != '0' && github.event.inputs.dry_run != 'true'
        continue-on-error: true
        env:
          GOOGLE_INDEXING_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
          SITE_URL: https://naukridhaba.in
        run: |
          # Skip if secret not configured
          if [ -z "$GOOGLE_INDEXING_SA_KEY" ]; then
            echo "GOOGLE_INDEXING_SA_KEY not set — skipping Indexing API (sitemap ping already done)"
            exit 0
          fi
          # Build list of new post URLs from committed MDX files
          git diff HEAD~1 --name-only --diff-filter=A | grep "content/.*\.mdx$" | while read mdx; do
            slug=$(echo "$mdx" | sed 's|content/||; s|\.mdx$|/|')
            echo "${SITE_URL}/${slug}"
          done > /tmp/new_urls.txt
          COUNT=$(wc -l < /tmp/new_urls.txt)
          echo "Notifying Google Indexing API for $COUNT new URLs"
          python3 scraper/notify_indexing_api.py \
            --key-json "$GOOGLE_INDEXING_SA_KEY" \
            --urls-file /tmp/new_urls.txt

      - name: Trigger Next.js deploy
        if: steps.changes.outputs.changed != '0' && github.event.inputs.dry_run != 'true'
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: deploy

      - name: Commit scraper log (always — for debugging)
        if: always()
        continue-on-error: true
        run: |
          git config user.name "Naukri Dhaba Bot" 2>/dev/null || true
          git config user.email "bot@naukridhaba.in" 2>/dev/null || true
          git add content/ 2>/dev/null || true
          git add -f scraper/logs/scraper.log 2>/dev/null || true
          git add -f scraper/seen_items.json 2>/dev/null || true
          if ! git diff --cached --quiet 2>/dev/null; then
            UNPUSHED_MDX=$(git diff --cached --name-only 2>/dev/null | grep "\.mdx$" | wc -l)
            if [ "$UNPUSHED_MDX" -gt "0" ]; then
              MSG="chore: scrape $(date +'%d %b %Y') — $UNPUSHED_MDX new posts [skip ci]"
            else
              MSG="debug: scraper log $(date +'%d %b %Y %H:%M IST') [skip ci]"
            fi
            git commit -m "$MSG" || true
            for attempt in 1 2 3; do
              git fetch origin ${{ github.ref_name }} || true
              git merge -X theirs FETCH_HEAD --no-edit || true
              git push origin HEAD:${{ github.ref_name }} && break || sleep $((attempt * 5))
            done || true
          fi

      - name: Show scraper log
        if: always()
        run: tail -100 scraper/logs/scraper.log 2>/dev/null || echo "(no log)"

      - name: Self-trigger if content goals not met
        if: always() && github.event.inputs.dry_run != 'true'
        continue-on-error: true
        run: |
          JOBS=$(find content/jobs -name "*.mdx" 2>/dev/null | wc -l)
          RESULTS=$(find content/results -name "*.mdx" 2>/dev/null | wc -l)
          ADMITS=$(find content/admit-cards -name "*.mdx" 2>/dev/null | wc -l)
          TARGET_JOBS=3000
          TARGET_RESULTS=2000
          TARGET_ADMITS=1500
          echo "Current: jobs=$JOBS results=$RESULTS admits=$ADMITS"
          echo "Targets: jobs=$TARGET_JOBS results=$TARGET_RESULTS admits=$TARGET_ADMITS"
          if [ "$JOBS" -lt "$TARGET_JOBS" ] || [ "$RESULTS" -lt "$TARGET_RESULTS" ] || [ "$ADMITS" -lt "$TARGET_ADMITS" ]; then
            echo "Goals not met — scheduling next scraper run"
            git config user.name "Naukri Dhaba Bot"
            git config user.email "bot@naukridhaba.in"
            date > scraper/run-now
            git add scraper/run-now
            git commit -m "chore: auto-trigger scraper ($JOBS jobs / $RESULTS results / $ADMITS admits) [skip ci]" || true
            for attempt in 1 2 3 4 5; do
              git fetch origin ${{ github.ref_name }} || true
              git merge -X theirs FETCH_HEAD --no-edit || true
              git push origin HEAD:${{ github.ref_name }} && break || sleep $((attempt * 5))
            done
            echo "Next scraper run triggered."
          else
            echo "All content goals met! jobs=$JOBS results=$RESULTS admits=$ADMITS — scraper loop complete."
          fi
