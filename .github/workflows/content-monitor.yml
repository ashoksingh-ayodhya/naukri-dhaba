name: Content Monitor Agent

# ──────────────────────────────────────────────────────────────────
# Runs daily AFTER the scraper to check if content was refreshed.
# If nothing changed in 24h, or count dropped, opens a GitHub issue.
# ──────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 6 * * *"   # 11:30 AM IST — 1 hour after scraper finishes
  workflow_dispatch:       # manual trigger any time

permissions:
  contents: write   # to commit state.json
  issues: write     # to create alert issues

jobs:
  monitor:
    name: Monitor content freshness & problem board
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout (full history for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run monitor agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 agent/monitor.py

      - name: Commit updated state.json
        continue-on-error: true
        run: |
          git config user.name "Naukri Dhaba Monitor"
          git config user.email "bot@naukridhaba.in"
          git add agent/state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: monitor state $(date +'%d %b %Y') [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No state change to commit."
          fi

      - name: Print open problem board
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('agent/problems.json')
          if p.exists():
              d = json.loads(p.read_text())
              open_p = [x for x in d['problems'] if x.get('status') == 'open']
              print(f'Open problems: {len(open_p)}')
              for x in open_p:
                  print(f\"  [{x['priority'].upper()}] {x['id']}: {x['title']}\")
          "
