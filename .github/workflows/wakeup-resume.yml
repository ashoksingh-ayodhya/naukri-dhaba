name: Claude Wakeup & Resume

# ─────────────────────────────────────────────────────────────────────────────
# Fires automatically to resume pending tasks after credit refill.
# Also runs every 6 hours as a content-goal watchdog — if goals are not met,
# it ensures the scraper is running and leaves a RESUME.md with current state.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every 6 hours starting at 00:00 UTC
    - cron: "0 */6 * * *"
  repository_dispatch:
    types: [claude-wakeup]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are we waking up?"
        required: false
        default: "Manual wakeup"

permissions:
  contents: write

jobs:
  wakeup:
    name: "Wakeup — check progress + resume tasks"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Count content files
        id: counts
        run: |
          JOBS=$(find content/jobs -name "*.mdx" 2>/dev/null | wc -l)
          RESULTS=$(find content/results -name "*.mdx" 2>/dev/null | wc -l)
          ADMITS=$(find content/admit-cards -name "*.mdx" 2>/dev/null | wc -l)
          echo "jobs=$JOBS" >> $GITHUB_OUTPUT
          echo "results=$RESULTS" >> $GITHUB_OUTPUT
          echo "admits=$ADMITS" >> $GITHUB_OUTPUT
          echo "Content: jobs=$JOBS results=$RESULTS admits=$ADMITS"
          GOALS_MET=true
          [ "$JOBS" -lt 3000 ] && GOALS_MET=false
          [ "$RESULTS" -lt 2000 ] && GOALS_MET=false
          [ "$ADMITS" -lt 1500 ] && GOALS_MET=false
          echo "goals_met=$GOALS_MET" >> $GITHUB_OUTPUT

      - name: Check last scraper commit age
        id: scraper_age
        run: |
          LAST_SCRAPE=$(git log --oneline --all --format="%ct %s" | grep "chore: scrape" | head -1 | cut -d' ' -f1)
          NOW=$(date +%s)
          if [ -n "$LAST_SCRAPE" ]; then
            AGE_HOURS=$(( (NOW - LAST_SCRAPE) / 3600 ))
            echo "age_hours=$AGE_HOURS" >> $GITHUB_OUTPUT
            echo "Last scraper run: ${AGE_HOURS}h ago"
          else
            echo "age_hours=999" >> $GITHUB_OUTPUT
            echo "No scraper commit found"
          fi

      - name: Write RESUME.md with current state
        run: |
          cat > RESUME.md << 'HEREDOC'
          # Claude Code Resume Instructions

          **Auto-generated by wakeup workflow — pick up from here**

          ## Current State
          HEREDOC

          echo "- **Date**: $(date +'%d %b %Y %H:%M IST')" >> RESUME.md
          echo "- **Jobs**: ${{ steps.counts.outputs.jobs }} / 3000 target" >> RESUME.md
          echo "- **Results**: ${{ steps.counts.outputs.results }} / 2000 target" >> RESUME.md
          echo "- **Admits**: ${{ steps.counts.outputs.admits }} / 1500 target" >> RESUME.md
          echo "- **Goals met**: ${{ steps.counts.outputs.goals_met }}" >> RESUME.md
          echo "- **Last scraper**: ${{ steps.scraper_age.outputs.age_hours }}h ago" >> RESUME.md
          echo "" >> RESUME.md

          cat >> RESUME.md << 'HEREDOC'
          ## Pending Tasks (priority order)

          1. **Merge PR #141** — expired jobs fix (`parseDDMMYYYY` DD-MM-YYYY separator) — ready to merge to main
          2. **SEO implementation** from SEO-COMPETITOR-AUDIT:
             - Qualification-based pages: `/jobs/10th-pass/`, `/jobs/graduate/`, `/jobs/diploma/`, `/jobs/engineering/`
             - Google Indexing API integration for new posts (gets into Google for Jobs in 30 min)
             - Related jobs sidebar widget on detail pages
          3. **Content targets** — scraper auto-runs every 3 hours; verify it's hitting new sources
          4. **GSC verification** — fill `GSC_CODE` in `app/layout.tsx` with Search Console meta tag value
          5. **GCP Cloud Run** — package scraper as Docker, deploy for 24/7 scraping without GitHub Actions limits

          ## How to resume

          ```bash
          git checkout main && git pull origin main
          # Then ask Claude Code to: "Resume from RESUME.md — implement pending tasks"
          ```
          HEREDOC

      - name: Trigger scraper if goals not met and scraper is stale
        if: steps.counts.outputs.goals_met == 'false' && steps.scraper_age.outputs.age_hours > 4
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: scrape

      - name: Commit RESUME.md
        run: |
          git config user.name "Naukri Dhaba Bot"
          git config user.email "bot@naukridhaba.in"
          git add RESUME.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: wakeup state — jobs=${{ steps.counts.outputs.jobs }} results=${{ steps.counts.outputs.results }} admits=${{ steps.counts.outputs.admits }} [skip ci]"
            for attempt in 1 2 3; do
              git fetch origin main || true
              git merge -X ours FETCH_HEAD --no-edit || true
              git push origin HEAD:main && break || sleep $((attempt * 5))
            done
          fi
          echo "RESUME.md updated — Claude Code will pick this up on next session start"
