name: Claude Wakeup — Resume Tasks

# Fires once after credit refill (~4h15m from when scheduled).
# Commits a resume-trigger file so the scraper loop self-triggers,
# then dispatches the scraper directly for an immediate catch-up run.

on:
  schedule:
    # 23:18 UTC June 2 2026 (≈4h15m after session pause)
    - cron: "18 23 2 6 *"
    # Backup: 02:18 UTC June 3 in case the first cron misses
    - cron: "18 2 3 6 *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual trigger"

permissions:
  contents: write

jobs:
  wakeup:
    name: "Wakeup — check progress + re-trigger scraper"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count content progress
        id: count
        run: |
          JOBS=$(find content/jobs -name "*.mdx" 2>/dev/null | wc -l)
          RESULTS=$(find content/results -name "*.mdx" 2>/dev/null | wc -l)
          ADMITS=$(find content/admit-cards -name "*.mdx" 2>/dev/null | wc -l)
          echo "jobs=$JOBS" >> $GITHUB_OUTPUT
          echo "results=$RESULTS" >> $GITHUB_OUTPUT
          echo "admits=$ADMITS" >> $GITHUB_OUTPUT
          echo "Content: jobs=$JOBS / results=$RESULTS / admits=$ADMITS"
          echo "Targets: jobs=3000 / results=2000 / admits=1500"
          DONE=true
          [ "$JOBS" -lt 3000 ] && DONE=false
          [ "$RESULTS" -lt 2000 ] && DONE=false
          [ "$ADMITS" -lt 1500 ] && DONE=false
          echo "all_done=$DONE" >> $GITHUB_OUTPUT

      - name: Show recent git log
        run: git log --oneline -10

      - name: Write resume trigger + dispatch scraper (goals not met)
        if: steps.count.outputs.all_done == 'false'
        run: |
          git config user.name "Naukri Dhaba Bot"
          git config user.email "bot@naukridhaba.in"
          JOBS=${{ steps.count.outputs.jobs }}
          RESULTS=${{ steps.count.outputs.results }}
          ADMITS=${{ steps.count.outputs.admits }}
          echo "wakeup at $(date -u '+%Y-%m-%d %H:%M UTC') — jobs=$JOBS results=$RESULTS admits=$ADMITS" > scraper/run-now
          git add scraper/run-now
          git diff --cached --quiet || git commit -m "chore: wakeup-resume trigger (jobs=$JOBS results=$RESULTS admits=$ADMITS) [skip ci]"
          git fetch origin main
          git merge -X ours FETCH_HEAD --no-edit || true
          git push origin HEAD:main || true
          echo "Wakeup trigger committed. Scraper will auto-trigger from run-now push."

      - name: Report all goals met
        if: steps.count.outputs.all_done == 'true'
        run: |
          JOBS=${{ steps.count.outputs.jobs }}
          RESULTS=${{ steps.count.outputs.results }}
          ADMITS=${{ steps.count.outputs.admits }}
          echo "ALL CONTENT GOALS MET!"
          echo "jobs=$JOBS (target 3000) ✅"
          echo "results=$RESULTS (target 2000) ✅"
          echo "admits=$ADMITS (target 1500) ✅"
          echo "Wakeup workflow has nothing to do — scraper targets achieved."
