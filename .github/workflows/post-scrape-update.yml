name: Deploy Next.js Site

# NOTE: Cloudflare Pages handles the actual deploy automatically when
# any push lands on main. Configure CF Pages with:
#   Build command:        npm run build
#   Build output dir:     out
#   Node.js version:      20
# Once that's set, this workflow is only needed to verify the build passes.

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.html"
      - "**/*.html"
      - "*.txt"
      - "_next/**"
      - "index.html"
      - "sitemap.xml"
      - "robots.txt"
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-deploy:
    name: Build → Export → Push to main
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Kolkata
      NEXT_PUBLIC_SITE_URL: https://naukridhaba.in

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://naukridhaba.in

      - name: Sync latest main (scraper may have pushed MDX since checkout)
        run: |
          git fetch origin main
          git merge -X ours FETCH_HEAD --no-edit || true

      - name: Copy built output to repo root
        run: cp -r out/. .

      - name: Commit and push built files to main
        continue-on-error: true
        run: |
          git config user.name "Naukri Dhaba Bot"
          git config user.email "bot@naukridhaba.in"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing changed — no deploy commit needed."
          else
            git commit -m "deploy: $(date +'%d %b %Y %H:%M IST')"
            git push origin HEAD:main || echo "⚠️  Push blocked (branch protection). Configure CF Pages to run 'npm run build' with output dir 'out' — then this step is not needed."
          fi

      - name: Summary
        run: echo "✅ Build succeeded (608+ pages). Site live via Cloudflare Pages."
