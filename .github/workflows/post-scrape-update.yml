name: Deploy Next.js Site

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    name: Build → Export → Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Kolkata
      NEXT_PUBLIC_SITE_URL: https://naukridhaba.in

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build search index
        run: npx ts-node -e "require('./lib/build-search-index').buildSearchIndex()" || true

      - name: Build Next.js (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://naukridhaba.in

      - name: Add .nojekyll to output
        run: touch out/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          cname: naukridhaba.in
          commit_message: "deploy: $(date +'%d %b %Y %H:%M IST')"
