name: SEO & Design Validation

# Runs on every PR and push to main to ensure new content follows
# the established SEO optimization and V2 design template standards.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: seo-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate SEO, design & structured data
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate generated site (SEO, meta tags, JSON-LD, design)
        run: python3 validate-generated-site.py

      - name: Verify sitemap exists and is well-formed
        run: |
          if [ ! -f sitemap.xml ]; then
            echo "ERROR: sitemap.xml is missing"
            exit 1
          fi
          echo "sitemap.xml exists ($(wc -l < sitemap.xml) lines)"

      - name: Verify robots.txt exists
        run: |
          if [ ! -f robots.txt ]; then
            echo "ERROR: robots.txt is missing"
            exit 1
          fi
          # Ensure sitemap is referenced
          if ! grep -q "Sitemap:" robots.txt; then
            echo "ERROR: robots.txt missing Sitemap directive"
            exit 1
          fi
          echo "robots.txt OK"

      - name: Spot-check detail page SEO (sample)
        run: |
          python3 -c "
          import re, json, sys, pathlib

          errors = []
          for d in ['jobs', 'results', 'admit-cards']:
              pages = list(pathlib.Path(d).rglob('*.html'))
              if not pages:
                  continue
              # Check first page as a sample
              p = pages[0]
              content = p.read_text(encoding='utf-8', errors='replace')

              # Must have canonical
              if 'rel=\"canonical\"' not in content and \"rel='canonical'\" not in content:
                  errors.append(f'{p}: missing canonical link')

              # Must have JSON-LD
              if 'application/ld+json' not in content:
                  errors.append(f'{p}: missing JSON-LD structured data')

              # Must have og:image
              if 'og:image' not in content:
                  errors.append(f'{p}: missing og:image')

              print(f'  {d}/: checked {len(pages)} pages, sample: {p.name} OK')

          if errors:
              for e in errors:
                  print(f'FAIL: {e}')
              sys.exit(1)
          print('All sample detail pages pass SEO spot-check.')
          "
