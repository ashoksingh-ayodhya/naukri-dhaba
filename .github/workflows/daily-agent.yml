name: Naukri Dhaba Agent

# ──────────────────────────────────────────────────────────────────────────────
# Autonomous agent that runs daily and:
#  1. Removes "Sarkari Result" branding from all MDX files → commits fix
#  2. Checks if scraper ran in last 24h → creates GitHub issue if stale
#  3. Clears seen_items.json if content is stale → forces full re-scrape
#  4. Writes scraper/run-now → triggers daily-scraper workflow immediately
#  5. Audits SEO fields across all job MDX files
#  6. Prints open problem board to the log
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 6 * * *"   # 11:30 AM IST — 1h after scraper, daily
  workflow_dispatch:       # manual trigger any time

permissions:
  contents: write
  issues: write

jobs:
  agent:
    name: "Agent — audit + fix + notify"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Kolkata

    steps:
      - name: Checkout (full history for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 agent/agent.py

      - name: Push agent commits (branding fixes, state, run-now)
        if: always()
        continue-on-error: true
        run: |
          git config user.name "Naukri Dhaba Agent"
          git config user.email "bot@naukridhaba.in"
          # agent.py already committed fixes; just push them
          git fetch origin ${{ github.ref_name }}
          git merge -X ours FETCH_HEAD --no-edit || true
          git push origin HEAD:${{ github.ref_name }} || true
          echo "Push done."
