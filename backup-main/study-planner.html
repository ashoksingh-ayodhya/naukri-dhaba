    <main class="container" style="padding:2rem 1rem;max-width:800px;">
        <h1 style="color:var(--primary);margin-bottom:.5rem;">Study Planner</h1>
        <p style="color:#666;margin-bottom:2rem;">Enter your exam details and get a personalized day-by-day study schedule.</p>

        <div class="card" style="margin-bottom:1.5rem;">
            <h2 style="color:var(--primary);margin-top:0;font-size:1.1rem;">Exam Details</h2>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label>Exam Name</label>
                    <input type="text" id="sp-exam" placeholder="e.g. UPSC CSE 2026" style="width:100%;padding:.6rem;border:1px solid #ddd;border-radius:4px;font-size:1rem;">
                </div>
                <div class="form-group">
                    <label>Exam Date</label>
                    <input type="date" id="sp-date" style="width:100%;padding:.6rem;border:1px solid #ddd;border-radius:4px;font-size:1rem;">
                </div>
                <div class="form-group">
                    <label>Study Hours Per Day</label>
                    <input type="number" id="sp-hours" min="1" max="16" value="6" style="width:100%;padding:.6rem;border:1px solid #ddd;border-radius:4px;font-size:1rem;">
                </div>
                <div class="form-group">
                    <label>Rest Days Per Week</label>
                    <select id="sp-rest" style="width:100%;padding:.6rem;border:1px solid #ddd;border-radius:4px;font-size:1rem;">
                        <option value="0">0 (No rest)</option>
                        <option value="1" selected>1 (Sunday off)</option>
                        <option value="2">2 (Sat & Sun off)</option>
                    </select>
                </div>
            </div>

            <h3 style="color:var(--primary);margin-bottom:.75rem;font-size:1rem;">Subjects to Cover</h3>
            <div id="sp-subjects" style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;">
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="General Studies" checked> General Studies</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="Reasoning"> Reasoning</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="Mathematics"> Mathematics</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="English"> English</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="Hindi"> Hindi</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="Current Affairs"> Current Affairs</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="History"> History</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="Geography"> Geography</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="Science"> Science</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="Polity"> Polity</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="Economy"> Economy</label>
                <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;"><input type="checkbox" value="Previous Papers"> Previous Papers</label>
            </div>

            <button onclick="generatePlan()" class="btn btn--primary btn--large" style="width:100%;">Generate My Study Plan</button>
        </div>

        <div id="sp-result" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;">
                <h2 id="sp-plan-title" style="color:var(--primary);margin:0;font-size:1.1rem;"></h2>
                <button onclick="savePlan()" class="btn btn--secondary btn--small">Save Plan</button>
            </div>
            <div id="sp-summary" style="background:#e8f5e9;border-radius:6px;padding:1rem;margin-bottom:1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;"></div>
            <div id="sp-schedule"></div>
        </div>

        <script>
        var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var DAY_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

        function generatePlan() {
            var exam    = document.getElementById('sp-exam').value.trim() || 'My Exam';
            var dateVal = document.getElementById('sp-date').value;
            var hours   = parseInt(document.getElementById('sp-hours').value) || 6;
            var rest    = parseInt(document.getElementById('sp-rest').value);
            var checks  = document.querySelectorAll('#sp-subjects input[type=checkbox]:checked');
            var subjects = [];
            checks.forEach(function(c){ subjects.push(c.value); });
            if (!subjects.length) { alert('Please select at least one subject.'); return; }
            if (!dateVal) { alert('Please enter the exam date.'); return; }

            var examDate = new Date(dateVal);
            var today    = new Date(); today.setHours(0,0,0,0);
            var diffMs   = examDate - today;
            var totalDays = Math.ceil(diffMs / (1000*60*60*24));
            if (totalDays <= 0) { alert('Exam date must be in the future.'); return; }

            // rest days per week — last N days of week (Sat, Sun)
            var restDays = rest === 2 ? [0,6] : (rest === 1 ? [0] : []);
            var studyDays = 0;
            for (var d = 0; d < totalDays; d++) {
                var dd = new Date(today); dd.setDate(today.getDate() + d);
                if (!restDays.includes(dd.getDay())) studyDays++;
            }
            var totalHours = studyDays * hours;
            var hoursPerSubject = Math.round(totalHours / subjects.length);

            // Build summary
            document.getElementById('sp-plan-title').textContent = exam + ' — Study Plan';
            var sumEl = document.getElementById('sp-summary');
            sumEl.innerHTML = [
                ['Days Left', totalDays],
                ['Study Days', studyDays],
                ['Total Hours', totalHours],
                ['Hours/Subject', hoursPerSubject],
                ['Hours/Day', hours],
                ['Subjects', subjects.length]
            ].map(function(x){
                return '<div style="text-align:center;"><div style="font-size:1.4rem;font-weight:700;color:var(--primary);">'+x[1]+'</div><div style="font-size:.8rem;color:#666;">'+x[0]+'</div></div>';
            }).join('');

            // Build weekly schedule
            var schedEl = document.getElementById('sp-schedule');
            var html = '<h3 style="color:var(--primary);">Weekly Schedule</h3>';
            html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:.35rem;text-align:center;">';
            var si = 0;
            for (var day = 0; day < 7; day++) {
                var isRest = restDays.includes(day);
                if (isRest) {
                    html += '<div style="background:#f5f5f5;border-radius:6px;padding:.75rem .25rem;">';
                    html += '<div style="font-weight:600;font-size:.85rem;color:#999;">'+DAY_NAMES[day]+'</div>';
                    html += '<div style="font-size:.75rem;color:#bbb;margin-top:.25rem;">Rest</div>';
                } else {
                    var subj = subjects[si % subjects.length]; si++;
                    html += '<div style="background:var(--surface);border:1px solid #e0e0e0;border-radius:6px;padding:.75rem .25rem;">';
                    html += '<div style="font-weight:600;font-size:.85rem;color:var(--primary);">'+DAY_NAMES[day]+'</div>';
                    html += '<div style="font-size:.75rem;color:#444;margin-top:.25rem;line-height:1.3;">'+subj+'</div>';
                    html += '<div style="font-size:.7rem;color:#888;margin-top:.2rem;">'+hours+'h</div>';
                }
                html += '</div>';
            }
            html += '</div>';

            // Phase breakdown
            html += '<h3 style="color:var(--primary);margin-top:1.5rem;">Phase Breakdown</h3>';
            html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;">';
            var phases = [
                {name:'Foundation',pct:40,color:'#e8f5e9',tc:'#2e7d32',desc:'Cover basics of each subject'},
                {name:'Practice',pct:35,color:'#e3f2fd',tc:'#0d47a1',desc:'Solve previous papers & MCQs'},
                {name:'Revision',pct:20,color:'#fff3e0',tc:'#e65100',desc:'Quick revision of all topics'},
                {name:'Mock Tests',pct:5,color:'#fce4ec',tc:'#880e4f',desc:'Full mock tests & analysis'},
            ];
            phases.forEach(function(p){
                var pDays = Math.round(studyDays * p.pct / 100);
                html += '<div style="background:'+p.color+';border-radius:6px;padding:1rem;">';
                html += '<div style="font-weight:600;color:'+p.tc+';">'+p.name+' ('+p.pct+'%)</div>';
                html += '<div style="font-size:.85rem;color:#555;margin:.3rem 0;">~'+pDays+' study days</div>';
                html += '<div style="font-size:.8rem;color:#666;">'+p.desc+'</div>';
                html += '</div>';
            });
            html += '</div>';
            schedEl.innerHTML = html;
            document.getElementById('sp-result').style.display = 'block';
            document.getElementById('sp-result').scrollIntoView({behavior:'smooth'});
        }

        function savePlan() {
            var exam = document.getElementById('sp-exam').value.trim() || 'My Exam';
            var data = { exam:exam, date:document.getElementById('sp-date').value, hours:document.getElementById('sp-hours').value, rest:document.getElementById('sp-rest').value };
            try { localStorage.setItem('nd_study_plan', JSON.stringify(data)); alert('Plan saved!'); } catch(e) {}
        }

        // Restore saved plan
        (function(){
            try {
                var saved = localStorage.getItem('nd_study_plan');
                if (!saved) return;
                var d = JSON.parse(saved);
                if (d.exam) document.getElementById('sp-exam').value = d.exam;
                if (d.date) document.getElementById('sp-date').value = d.date;
                if (d.hours) document.getElementById('sp-hours').value = d.hours;
                if (d.rest) document.getElementById('sp-rest').value = d.rest;
            } catch(e){}
        })();
        </script>
    </main>
