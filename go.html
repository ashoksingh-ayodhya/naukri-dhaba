<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting | Naukri Dhaba</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.naukridhaba.in/go.html">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: #f4f5f7;
      color: #1b1f23;
    }
    main {
      max-width: 40rem;
      padding: 2rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
    }
    a {
      color: #0b57d0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Redirecting</h1>
    <p id="status">Preparing the destination link…</p>
    <p><a id="fallback" href="/">Return to Naukri Dhaba</a></p>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var target = params.get("target");
      var status = document.getElementById("status");
      var fallback = document.getElementById("fallback");
      if (!target) {
        status.textContent = "No destination was provided.";
        return;
      }

      try {
        var parsed = new URL(target, window.location.origin);
        if (!/^https?:$/.test(parsed.protocol)) {
          throw new Error("Unsupported protocol");
        }

        fallback.href = parsed.href;
        fallback.rel = "nofollow noopener noreferrer";
        fallback.textContent = "Continue to source page";
        status.textContent = "You are being redirected to the source page.";
        window.location.replace(parsed.href);
      } catch (error) {
        status.textContent = "The destination link is invalid.";
      }
    })();
  </script>
</body>
</html>
