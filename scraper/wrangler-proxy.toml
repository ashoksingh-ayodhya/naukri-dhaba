# Naukri Dhaba — Cloudflare Fetch Proxy Worker
# Deploy: wrangler deploy --config scraper/wrangler-proxy.toml
# Docs:   https://developers.cloudflare.com/workers/configuration/
#
# This is the PROXY worker (cf-proxy-worker.js).
# It acts as a fetch relay so GitHub Actions can scrape sites that block
# GitHub's IP ranges.  Deploy this if you are using the Python scraper via
# GitHub Actions (NOT the standalone cf-scraper-worker.js).
#
# ── Setup ─────────────────────────────────────────────────────────────────────
# 1. Deploy:  wrangler deploy --config scraper/wrangler-proxy.toml
# 2. Copy the Worker URL (e.g. https://nd-proxy.YOUR-NAME.workers.dev)
# 3. Add to GitHub repo secrets:
#      CF_WORKER_PROXY_URL = https://nd-proxy.YOUR-NAME.workers.dev
#      CF_WORKER_SECRET    = (leave blank — optional auth)
# ── Secrets (set via CLI, never stored here) ──────────────────────────────────
# wrangler secret put PROXY_SECRET --config scraper/wrangler-proxy.toml
#   ← optional; if set, all proxy requests must include X-Proxy-Secret header

name = "naukri-dhaba-proxy"
main = "cf-proxy-worker.js"
compatibility_date = "2026-01-01"
